<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="app">
    <!-- Login Page -->
    <div id="login-page" class="page active">
      <div class="login-bg">
        <div class="login-grid"></div>
      </div>
      <div class="login-card">
        <div class="login-logo">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="12" fill="#1a1a2e"/>
            <path d="M8 28L20 12L32 28H8Z" fill="#e94560" opacity="0.9"/>
            <rect x="15" y="20" width="10" height="8" rx="1" fill="#fff"/>
          </svg>
          <span>CollegeCMS</span>
        </div>
        <h1 class="login-title">Welcome back</h1>
        <p class="login-sub">Sign in to your account</p>
        <div id="login-error" class="alert alert-error hidden"></div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Enter username" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password"/>
        </div>
        <button id="login-btn" class="btn btn-primary btn-full" onclick="doLogin()">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <div class="login-hints">
          <p>Test accounts:</p>
          <code>admin / Admin@123</code>
          <code>priya_r / Faculty@123</code>
          <code>kavya_r / Student@123</code>
        </div>
      </div>
    </div>

    <!-- App Shell (after login) -->
    <div id="app-shell" class="hidden">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="10" fill="#e94560"/>
              <path d="M8 28L20 12L32 28H8Z" fill="#fff" opacity="0.9"/>
              <rect x="15" y="20" width="10" height="8" rx="1" fill="#1a1a2e"/>
            </svg>
            <span>CollegeCMS</span>
          </div>
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>

        <div class="sidebar-user">
          <div class="avatar" id="user-avatar">A</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-username">Loading...</div>
            <div class="user-role" id="sidebar-role">—</div>
          </div>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav">
          <!-- Populated by JS based on role -->
        </nav>

        <button class="sidebar-logout" onclick="doLogout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Logout
        </button>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="main-content">
        <div class="topbar">
          <div class="topbar-title" id="page-title">Dashboard</div>
          <div class="topbar-actions" id="topbar-actions"></div>
        </div>
        <div class="content-area" id="content-area">
          <!-- Dynamic content loaded here -->
        </div>
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" onclick="closeModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/students.js"></script>
  <script src="js/pages/courses.js"></script>
  <script src="js/pages/colleges.js"></script>
  <script src="js/pages/users.js"></script>
  <script src="js/pages/registrations.js"></script>
  <script src="js/pages/my-courses.js"></script>
</body>
</html>
